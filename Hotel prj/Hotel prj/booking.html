<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Reservation | Aura Grande</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">AURA GRANDE</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="rooms.html">Rooms</a></li>
                    <li class="nav-item"><a class="nav-link active" href="booking.html">Booking</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Booking Form Section -->
    <div class="container py-5">
        <div class="row justify-content-center py-5">
            <div class="col-md-8">
                <div class="card shadow-lg border-0 p-5">
                    <div class="text-center mb-5">
                        <h2 class="display-5">Reserve Your Stay</h2>
                        <p class="text-muted">Fields marked with * are required.</p>
                    </div>
                    
                    <form id="booking-form">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Full Name *</label>
                                <input type="text" class="form-control form-control-lg" id="name" required placeholder="John Doe">
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email Address *</label>
                                <input type="email" class="form-control form-control-lg" id="email" required placeholder="john@example.com">
                            </div>
                            <div class="col-md-6">
                                <label for="room-type" class="form-label">Room Category *</label>
                                <select class="form-select form-select-lg" id="room-type" required>
                                    <option value="" disabled selected>Select a Room...</option>
                                    <option value="Deluxe City Room">Deluxe City Room ($350/night)</option>
                                    <option value="Presidential Suite">Presidential Suite ($850/night)</option>
                                    <option value="Ocean View Studio">Ocean View Studio ($450/night)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="guests" class="form-label">Number of Guests *</label>
                                <input type="number" class="form-control form-control-lg" id="guests" min="1" max="10" required placeholder="2">
                            </div>
                            <div class="col-md-6">
                                <label for="check-in" class="form-label">Check-in Date *</label>
                                <input type="date" class="form-control form-control-lg" id="check-in" required>
                            </div>
                            <div class="col-md-6">
                                <label for="check-out" class="form-label">Check-out Date *</label>
                                <input type="date" class="form-control form-control-lg" id="check-out" required>
                            </div>
                            <div class="col-12 mt-5">
                                <button type="submit" class="btn btn-gold w-100 btn-lg">Confirm Booking</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <div class="footer-logo">AURA GRANDE</div>
            <p class="text-muted">&copy; 2026 Aura Grande Hotels. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Auto-select room from URL query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('room');
        if (room) {
            const select = document.getElementById('room-type');
            if (room === 'Deluxe') select.value = 'Deluxe City Room';
            if (room === 'Presidential') select.value = 'Presidential Suite';
        }
    </script>
</body>
</html>
